name: PIE Elements CI

on:
  push:
    branches:
      - develop
      - master
  pull_request:
    branches:
      - develop
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - run: yarn install
      - run: scripts/release build
      - run: scripts/release test

  build-next:
    needs: test
    if: >
      github.event_name == 'push' &&
      github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write   # REQUIRED for npm trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/
          cache: yarn
      - run: |
          git config user.name "github-actions"
          git config user.email "github-actions@noreply.github.com"
      - run: yarn install
      - run: scripts/release --next --loglevel verbose

  build-release:
    needs: test
    if: >
      github.event_name == 'push' &&
      github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write   # REQUIRED for npm trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/
          cache: yarn
      - run: |
          git config user.name "github-actions"
          git config user.email "github-actions@noreply.github.com"
      - run: yarn install
      - run: scripts/release --loglevel verbose
